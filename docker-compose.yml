version: '3.8'

services:
  app:
    build: .
    image: baipiaodashi:latest
    container_name: baipiaodashi
    ports:
      - "11111:11111"
    volumes:
      - ./conf:/app/conf
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - LANG=zh_CN.UTF-8
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11111"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:latest
    container_name: baipiaodashi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

networks:
  default:
    name: baipiaodashi-network
